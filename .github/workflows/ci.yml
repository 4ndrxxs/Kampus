name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm verify

  package-cli:
    name: Package CLI Smoke
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Smoke packed CLI
        run: pnpm smoke:pack:cli

  keyed-smoke:
    name: Keyed NEIS Smoke
    runs-on: ubuntu-latest
    needs: [build-test, package-cli]

    steps:
      - name: Check keyed smoke eligibility
        id: gate
        shell: bash
        env:
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
        run: |
          if [ -n "$NEIS_API_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.gate.outputs.enabled == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        if: steps.gate.outputs.enabled == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.gate.outputs.enabled == 'true'
        run: pnpm build

      - name: Keyed smoke
        if: steps.gate.outputs.enabled == 'true'
        env:
          NEIS_API_KEY: ${{ secrets.NEIS_API_KEY }}
        run: pnpm smoke:keyed

      - name: Keyed smoke skipped
        if: steps.gate.outputs.enabled != 'true'
        run: echo "Skipping keyed smoke because NEIS_API_KEY is not configured."
