name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-pack:
    name: Build and Pack CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm verify

      - name: Pack CLI
        run: pnpm pack:cli

      - name: Smoke packed CLI
        run: pnpm smoke:pack:cli

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: kampus-cli-package
          path: artifacts/*.tgz

      - name: Publish CLI package
        if: ${{ startsWith(github.ref, 'refs/tags/v') && secrets.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish artifacts/*.tgz --access public
