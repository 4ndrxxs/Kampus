name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-pack:
    name: Build and Pack CLI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify
        run: pnpm verify

      - name: Pack CLI
        run: pnpm pack:cli

      - name: Smoke packed CLI
        run: pnpm smoke:pack:cli

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: kampus-package
          path: artifacts/*.tgz

      - name: Check publish eligibility
        id: publish-gate
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ] && [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish CLI package
        if: steps.publish-gate.outputs.enabled == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish artifacts/*.tgz --access public

      - name: Publish skipped
        if: steps.publish-gate.outputs.enabled != 'true'
        run: echo "Skipping npm publish because NPM_TOKEN is not configured or this is not a tag run."
